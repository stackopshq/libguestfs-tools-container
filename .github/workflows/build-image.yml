name: Build and Push Container Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Cancel previous runs of the same ref (e.g. repeated workflow_dispatch on main).
# Tag refs are unique per release, so this never cancels a release build.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: libguestfs-tools
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write   # cosign keyless via GitHub OIDC

jobs:
  build:
    name: Build ${{ matrix.variant }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # virt-v2v is not packaged for aarch64 in EPEL 10 (it converts VMs
        # from x86 hypervisors — VMware ESXi, Hyper-V — so an arm64 build is
        # not a meaningful target). The :full variant is therefore amd64-only;
        # slim is multi-arch.
        include:
          - { arch: amd64, runner: ubuntu-latest,    variant: slim }
          - { arch: amd64, runner: ubuntu-latest,    variant: full }
          - { arch: arm64, runner: ubuntu-24.04-arm, variant: slim }
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Compute version & tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          if [[ "${{ matrix.variant }}" == "full" ]]; then
            BASE_TAG="${VERSION}-full"
          else
            BASE_TAG="${VERSION}"
          fi
          ARCH_TAG="${BASE_TAG}-${{ matrix.arch }}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          {
            echo "version=${VERSION}"
            echo "base_tag=${BASE_TAG}"
            echo "arch_tag=${ARCH_TAG}"
            echo "build_date=${BUILD_DATE}"
          } >> "$GITHUB_OUTPUT"

      # Note: redhat-actions/{buildah-build,podman-login,push-to-registry} are
      # still on Node 20 at their current floating tags. Node 20 is deprecated
      # in GHA (default switches to Node 24 on 2026-06-02, removed 2026-09-16);
      # upstream hasn't tagged Node-24 versions yet. Renovate will bump these
      # when new tags ship. Replace with shell-only podman commands if upstream
      # doesn't move before the Node 20 removal date.
      - name: Build container image
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056  # v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.meta.outputs.arch_tag }}
          arch: ${{ matrix.arch }}
          containerfiles: ./Containerfile
          build-args: |
            VARIANT=${{ matrix.variant }}
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          oci: true

      - name: Smoke test (versions)
        # GitHub-hosted runners have no /dev/kvm, so libguestfs-test-tool can't
        # exercise the appliance. The downstream openimages.cloud workflows run
        # on self-hosted Rocky 10 runners with nested virt where the appliance
        # is exercised against real OS rootfs.
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ steps.build.outputs.image }}:${{ steps.meta.outputs.arch_tag }}"
          podman run --rm "$REF" qemu-img --version
          podman run --rm "$REF" virt-inspector --version
          if [[ "${{ matrix.variant }}" == "full" ]]; then
            podman run --rm "$REF" virt-v2v --version
          fi

      - name: Log in to GHCR
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603  # v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push per-arch image
        id: push
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c  # v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.meta.outputs.arch_tag }}
          registry: ${{ env.REGISTRY }}/${{ github.repository_owner }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign image (cosign keyless)
        env:
          COSIGN_YES: "true"
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          cosign sign "$REF"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.variant }}-${{ matrix.arch }}.spdx.json

      - name: Attach SBOM as cosign attestation
        env:
          COSIGN_YES: "true"
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          cosign attest --predicate "sbom-${{ matrix.variant }}-${{ matrix.arch }}.spdx.json" --type spdxjson "$REF"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sbom-${{ matrix.variant }}-${{ matrix.arch }}
          path: sbom-${{ matrix.variant }}-${{ matrix.arch }}.spdx.json
          retention-days: 90

  manifest:
    name: Manifest list (${{ matrix.variant }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [slim, full]

    steps:
      - name: Compute tag list
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.build.outputs.version }}"
          # Stable tag groups:
          #   - tagged release (vX.Y.Z): vX.Y.Z, vX.Y, vX, plus floating (latest|slim|full).
          #   - workflow_dispatch on main: only floating dev tag.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            MAJOR="${VERSION%%.*}"
            MAJOR_MINOR="${VERSION%.*}"
            if [[ "${{ matrix.variant }}" == "full" ]]; then
              TAGS="${VERSION}-full ${MAJOR_MINOR}-full ${MAJOR}-full full"
              SOURCE_TAG="${VERSION}-full"
            else
              TAGS="${VERSION} ${MAJOR_MINOR} ${MAJOR} slim latest"
              SOURCE_TAG="${VERSION}"
            fi
          else
            if [[ "${{ matrix.variant }}" == "full" ]]; then
              TAGS="dev-full"
              SOURCE_TAG="${VERSION}-full"
            else
              TAGS="dev"
              SOURCE_TAG="${VERSION}"
            fi
          fi
          {
            echo "tags=${TAGS}"
            echo "source_tag=${SOURCE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603  # v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push manifest lists
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          SRC="${{ steps.tags.outputs.source_tag }}"
          VARIANT="${{ matrix.variant }}"
          for TAG in ${{ steps.tags.outputs.tags }}; do
            echo "::group::manifest ${REPO}:${TAG}"
            podman manifest exists "${REPO}:${TAG}" && podman manifest rm "${REPO}:${TAG}" || true
            podman manifest create "${REPO}:${TAG}"
            podman manifest add "${REPO}:${TAG}" "docker://${REPO}:${SRC}-amd64"
            # slim is multi-arch (amd64 + arm64); full is amd64-only because
            # virt-v2v is not packaged for aarch64 on EPEL 10.
            if [[ "${VARIANT}" == "slim" ]]; then
              podman manifest add "${REPO}:${TAG}" "docker://${REPO}:${SRC}-arm64"
            fi
            podman manifest push --all "${REPO}:${TAG}" "docker://${REPO}:${TAG}"
            echo "::endgroup::"
          done
